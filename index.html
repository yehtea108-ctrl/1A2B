<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>1A2B 遊戲中心</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbK2ckyJP_RlAGEcTUlOfk3nlWfwDa_HQ",
            authDomain: "a2b-89299.firebaseapp.com",
            projectId: "a2b-89299",
            storageBucket: "a2b-89299.firebasestorage.app",
            messagingSenderId: "685135427869",
            appId: "1:685135427869:web:e022765e2415cfc86b89f4",
            measurementId: "G-KC342WM798"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 登入邏輯
        window.handleAuth = function(isSignUp) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(isSignUp) {
                createUserWithEmailAndPassword(auth, email, password).catch(e => alert(e.message));
            } else {
                signInWithEmailAndPassword(auth, email, password).catch(e => alert(e.message));
            }
        };

        // 檢查狀態
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
            } else {
                document.getElementById('auth-screen').style.display = 'block';
                document.getElementById('game-screen').style.display = 'none';
            }
        });
        window.logout = () => signOut(auth);
    </script>
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; display: inline-block; }
        input { display: block; margin: 10px auto; padding: 8px; width: 200px; }
        button { padding: 10px 20px; cursor: pointer; background: #29b6f6; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen" class="box">
        <h1>請登入帳號</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="密碼">
        <button onclick="handleAuth(false)">登入</button>
        <button onclick="handleAuth(true)" style="background:#666;">註冊新帳號</button>
    </div>

    <div id="game-screen" style="display:none;">
        <h1>1A2B 猜數字遊戲</h1>
        <p>歡迎回來！</p>
        <button onclick="logout()">登出</button>
        </div>
</body>
</html>
